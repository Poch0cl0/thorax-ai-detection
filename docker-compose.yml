services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thorax
      POSTGRES_PASSWORD: thorax
      POSTGRES_DB: thorax
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thorax -d thorax"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://thorax:thorax@db:5432/thorax
      SECRET_KEY: ${SECRET_KEY:-change-me-use-env-secret-key}
      CORS_ORIGINS: http://localhost,http://localhost:80,http://127.0.0.1
      MODEL_PATH: ${MODEL_PATH:-}
      MODEL_VERSION: ${MODEL_VERSION:-stub-0.1.0}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
